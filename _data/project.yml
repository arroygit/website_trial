- title: "Federated Reinforcement and Imitation Learning for Safe and Scalable Autonomous Driving"
  key: "WASP-IPhD-2026-AT"
  agency: "WASP"
  category: "WASP Industrial PhD project grant"
  period: "2026-2030"
  ongoing: 1
  lead: "*André Teixeira* (PI-UU), together with Mina Alibeigi (PI-Zenseact)"
  member: "TBA (PhD student at Zenseact)"
  selected: 0
  summary: "This project introduces a Federated Reinforcement and Imitation Learning (FRL+FIL) framework for safe, scalable, and privacy-preserving training of planning policies in (semi-)autonomous fleets. The approach enables vehicles to collaboratively learn planning policies without sharing raw data, thus preserving privacy while exploiting the diversity of large fleets. Planning policies will be bootstrapped from expert demonstrations and refined locally through shielded reinforcement learning, with runtime safety mechanisms—such as coarse planners and learned safety filters—ensuring safe exploration. Model updates will be aggregated using robust federated techniques that tolerate faulty or malicious clients with low-quality driving behaviors and support personalization for region-specific adaptations. The framework will be validated on both simulated and real-world driving datasets, paving the way for the industrial deployment of next-generation AD/ADAS systems that are safer, more robust, and human-like in their driving behavior."

- title: "SecReCy4You - Young researcher network for security and resilience of critical cyber-physical systems"
  key: "MSCA-DN-2024-AT"
  agency: "European Commission"
  category: "EU MSCA Doctoral Network"
  period: "2026-2029"
  ongoing: 1
  lead: "*André Teixeira* (PI-UU), together with PIs from 7 other EU universities"
  member: "TBA"
  selected: 1
  summary: "This DN intends to bridge the gap between theory and practice for secure and resilient cyber-physical systems by tackling the problem at its root. It brings together domain experts from control theory, computer science, and major industrial stakeholders to boost the security and resilience of control systems by outlining a sustainable program for training the next generation of innovators in this critical domain. It pursues a holistic approach that combines specialized training (in both academia and industry), while identifying challenging characteristics and security flaws in existing legacy systems, and pinpointing design requirements and solutions in future (networked) control systems."

- title: "Prob4Sec - Probabilistic Methods for Secure Learning and Control"
  key: "VR2023-AT"
  agency: "Swedish Research Council (Vetenskapsrådet)"
  category: "VR Project Grant in Information and Cyber Security"
  period: "2023-2027"
  ongoing: 1
  lead: "*André Teixeira* (PI) and *Per Mattsson*"
  member: "Ville Kjellqvist"
  selected: 0
  summary: "Prob4Sec aims to develop theory and probabilistic methods for securing cyber-physical systems (CPSs) possessing learning and control capabilities: digital devices that learn from data they collect, and automatically decide how to best interact with the physical world over time. Intelligent CPSs are pervasive in our society. Users rely and trust that these devices will operate in a safe and secure manner. The consequences of incorrect behaviors in CPSs can be dire, threatening the users well being. Securing these systems is of utmost importance. Probabilistic methods are a natural way to deal with the uncertainty of physical systems and unintentional failures. Mathematical and statistical tools enable us to take a small number of samples and still be able to draw general conclusions. However, attacks are not only probabilistic but can have strategic behaviors, tailored to causing harm while avoiding detection. Hence, it is critical to develop systematic approaches that integrate the probabilistic and the strategic aspects of attacks in security analysis. Prob4Sec combines knowledge from security, statistical methods, and AI and control engineering to develop new methods for designing secure CPSs with learning and control functionalities. These methods will be instrumental in preventing future threats to all who benefit from this technology. Prob4Sec will provide further tools based on which trust in new technologies can be built and communicated, from developers to end users."

