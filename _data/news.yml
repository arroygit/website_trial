- date: 11 June 2026
  headline: "Tung has been awarded the [Digital Futures Postdoctoral Fellowship](https://www.digitalfutures.kth.se/digital-futures-awards-funding-to-12-new-international-postdoctoral-projects/). The grant funds a 2-year postdoc employment at KTH Royal Institute of Technology. Congratulations!"

- date: 24 April 2026
  headline: "Our paper [''Secure Filtering against Spatio-Temporal False Data Attacks under Asynchronous Sampling''](https://arxiv.org/abs/2411.19765) was accepted to IEEE Transactions on Automatic Control. See the details at [Publications](publications)."

- date: 15 April 2026
  headline: "Our paper [''Impact analysis of hidden faults in nonlinear control systems using output-to-output gain''](https://arxiv.org/abs/2512.13483) was accepted to IFAC World Congress 2026. See the details at [Publications](publications)."

